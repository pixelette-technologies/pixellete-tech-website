<svg width="120" height="120" viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="ring" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a3a6e"/>
      <stop offset="100%" style="stop-color:#0d2240"/>
    </linearGradient>
  </defs>
  <!-- Outer ring -->
  <circle cx="60" cy="60" r="58" fill="url(#ring)" stroke="#2a5298" stroke-width="2"/>
  <!-- Inner circle -->
  <circle cx="60" cy="60" r="45" fill="#0d2240" stroke="#2a5298" stroke-width="1.5"/>
  <!-- Top text -->
  <text x="60" y="22" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" font-weight="700" fill="#ffffff" letter-spacing="1.5">CERTIFIED</text>
  <!-- Bottom text -->
  <text x="60" y="112" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" font-weight="700" fill="#ffffff" letter-spacing="1.5">COMPANY</text>
  <!-- ISO text -->
  <text x="60" y="55" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#ffffff">ISO</text>
  <!-- Number -->
  <text x="60" y="75" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="600" fill="#ffffff">27001:2022</text>
  <!-- Globe lines -->
  <ellipse cx="60" cy="88" rx="18" ry="6" fill="none" stroke="#2a5298" stroke-width="0.8" opacity="0.5"/>
  <line x1="42" y1="88" x2="78" y2="88" stroke="#2a5298" stroke-width="0.5" opacity="0.5"/>
</svg>
